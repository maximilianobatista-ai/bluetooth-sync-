name: Compilar APK Bluetooth Sync

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout codigo
      uses: actions/checkout@v4

    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Configurar Android SDK
      uses: android-actions/setup-android@v3

    - name: Instalar build-tools
      run: |
        sdkmanager "build-tools;35.0.0"
        sdkmanager "platforms;android-35"
        sdkmanager "platform-tools"

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Verificar estructura
      run: |
        echo "=== Estructura del proyecto ==="
        ls -la
        echo ""
        echo "=== Archivos Kotlin ==="
        find . -name "*.kt" | head -20
        echo ""
        echo "=== build.gradle ==="
        cat app/build.gradle.kts 2>/dev/null || cat app/build.gradle 2>/dev/null || echo "No encontrado"

    - name: Hacer gradlew ejecutable
      run: |
        chmod +x ./gradlew
        ls -la gradlew

    - name: Compilar APK Debug
      run: ./gradlew assembleDebug --stacktrace

    - name: Verificar APK generado
      run: |
        echo "=== Buscando APK ==="
        find . -name "*.apk" -type f
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Directorio no encontrado"

    - name: Subir APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: APK-Bluetooth-Sync
        path: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
        if-no-files-found: warn
        retention-days: 30
